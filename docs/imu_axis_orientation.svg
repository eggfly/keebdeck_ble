<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2266CC"/>
    </marker>
  </defs>

  <!-- Chip body (parallelogram to show 3D perspective) -->
  <polygon points="100,220 280,220 320,180 140,180" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Chip top face -->
  <polygon points="100,220 280,220 280,230 100,230" fill="#444" stroke="#333" stroke-width="1"/>
  <!-- Chip right face -->
  <polygon points="280,220 320,180 320,190 280,230" fill="#3a3a3a" stroke="#333" stroke-width="1"/>

  <!-- Pin 1 dot -->
  <circle cx="120" cy="195" r="5" fill="#999" stroke="#bbb" stroke-width="1"/>

  <!-- Axis origin point -->
  <!-- Origin at chip center-top: approximately (190, 195) -->

  <!-- X axis (right) -->
  <line x1="190" y1="200" x2="340" y2="200" stroke="#222" stroke-width="2.5" marker-end="url(#arrowBlack)"/>
  <text x="348" y="205" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#222">X, a</text>
  <text x="375" y="210" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#222">x</text>

  <!-- Y axis (upper-left, perspective) -->
  <line x1="190" y1="200" x2="95" y2="120" stroke="#222" stroke-width="2.5" marker-end="url(#arrowBlack)"/>
  <text x="58" y="115" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#222">Y, a</text>
  <text x="85" y="120" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#222">y</text>

  <!-- Z axis (up) -->
  <line x1="190" y1="200" x2="190" y2="45" stroke="#222" stroke-width="2.5" marker-end="url(#arrowBlack)"/>
  <text x="196" y="42" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#222">Z, a</text>
  <text x="223" y="47" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#222">z</text>

  <!-- Rotation arrows (angular velocity) -->
  <!-- omega_x: rotation around X axis (at right side) -->
  <path d="M 295,185 A 18,18 0 1,1 295,215" fill="none" stroke="#2266CC" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="278" y="210" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#2266CC">&omega;</text>
  <text x="291" y="214" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#2266CC">x</text>

  <!-- omega_y: rotation around Y axis (at upper-left) -->
  <path d="M 145,145 A 18,18 0 1,1 120,160" fill="none" stroke="#2266CC" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="148" y="165" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#2266CC">&omega;</text>
  <text x="161" y="169" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#2266CC">y</text>

  <!-- omega_z: rotation around Z axis (at top) -->
  <path d="M 210,90 A 18,18 0 1,1 175,105" fill="none" stroke="#2266CC" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="213" y="95" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#2266CC">&omega;</text>
  <text x="226" y="99" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#2266CC">z</text>

  <!-- Title -->
  <text x="200" y="310" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#555" text-anchor="middle">QMI8658A Chip Orientation Coordinate System</text>
  <text x="200" y="330" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888" text-anchor="middle">Right-handed coordinate system (ref: datasheet Figure 10)</text>
</svg>